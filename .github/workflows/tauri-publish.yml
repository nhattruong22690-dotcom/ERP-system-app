name: "publish"
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: install frontend dependencies
        run: npm install
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://xinhgroup.vercel.app
          IS_TAURI: 'true'
        with:
          tagName: v__VERSION__
          releaseName: "ERPApp v__VERSION__"
          releaseBody: "See the assets for the installer."
          releaseDraft: true
          prerelease: false

      - name: "Debug: List Files"
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse | Select-Object FullName

      - name: Generate Updater JSON
        shell: pwsh
        run: |
          $version = "0.1.13"
          $repo = "nhattruong22690-dotcom/ERP-system-app"
          $basePath = "src-tauri/target/release/bundle/nsis"
          
          # For updater, we need the .zip file and its .sig
          $bundle = Get-ChildItem "$basePath/*.nsis.zip" | Select-Object -First 1
          $signatureFile = Get-ChildItem "$basePath/*.nsis.zip.sig" | Select-Object -First 1
          
          if (-not $bundle) { 
            Write-Warning "ZIP bundle not found, trying fallback to any .sig file"
            $bundle = Get-ChildItem "$basePath/*.exe" | Select-Object -First 1
            $signatureFile = Get-ChildItem "$basePath/*.sig" | Select-Object -First 1
          }
          
          if (-not $bundle) { throw "No build artifacts found to generate manifest" }
          if (-not $signatureFile) { throw "Signature file not found even as fallback" }
          
          $signature = Get-Content $signatureFile.FullName -Raw
          $signature = $signature.Trim()
          
          $json = @{
            version = $version
            notes = "Xinh Group ERP Update v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/$repo/releases/latest/download/$($bundle.Name)"
              }
            }
          }
          
          $json | ConvertTo-Json -Depth 10 | Out-File -FilePath "src-tauri/target/release/bundle/nsis/latest.json" -Encoding utf8
          Write-Host "Manually generated latest.json with artifact: $($bundle.Name)"

      - name: Upload latest.json manually
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: src-tauri/target/release/bundle/nsis/latest.json
          tag_name: v0.1.13
          token: ${{ secrets.GITHUB_TOKEN }}
          append_body: true
          draft: true
